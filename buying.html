<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collect Sync — Buying Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
        .header { background: #1a1a2e; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a3e; }
        .header h1 { font-size: 1.5rem; }
        .nav { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: #4a90d9; border-color: #4a90d9; }
        .btn-green { background: #4caf50; border-color: #4caf50; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .page-title { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .page-subtitle { color: #888; font-size: 14px; margin-bottom: 2rem; }

        .submissions-grid { display: grid; gap: 12px; }
        .submission-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 20px; display: flex; justify-content: space-between; align-items: center; gap: 16px; transition: border-color 0.2s; cursor: pointer; }
        .submission-card:hover { border-color: #4a90d9; }
        .sub-info h3 { font-size: 15px; margin-bottom: 4px; }
        .sub-meta { font-size: 12px; color: #888; display: flex; gap: 12px; }
        .sub-stats { display: flex; gap: 16px; align-items: center; }
        .sub-stat { text-align: center; }
        .sub-stat .val { font-size: 1.1rem; font-weight: 700; }
        .sub-stat .lbl { font-size: 11px; color: #888; }
        .sub-stat .val.green { color: #4caf50; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-cat { background: rgba(74,144,217,0.15); color: #4a90d9; margin-right: 4px; }

        /* Detail Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border-radius: 12px; padding: 30px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #2a2a3e; }
        th { color: #888; font-size: 11px; text-transform: uppercase; }
        .offer-form { background: #12122a; border-radius: 8px; padding: 20px; margin-top: 16px; }
        .offer-form h3 { font-size: 14px; margin-bottom: 12px; }
        .offer-row { display: flex; gap: 12px; align-items: flex-end; }
        .offer-row .form-group { flex: 1; }
        .offer-row label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
        .offer-row input, .offer-row textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #0d0d1a; color: #fff; font-size: 14px; font-family: inherit; }
        .offer-row input:focus, .offer-row textarea:focus { outline: none; border-color: #4a90d9; }
        .existing-offer { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); border-radius: 8px; padding: 14px; margin-top: 12px; }
        .empty { text-align: center; padding: 3rem; color: #666; }

        .my-offers-section { margin-top: 2rem; }
        .my-offers-section h2 { font-size: 1.1rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Collect Sync — Buying Marketplace</h1>
        <div class="nav">
            <a href="admin.html" class="btn">Dashboard</a>
            <a href="inventory.html" class="btn">Inventory</a>
            <a href="buylist-review.html" class="btn">My Buylist</a>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">Cards for Sale</h1>
        <p class="page-subtitle">Browse cards that sellers have posted to the open marketplace. Make offers on collections you want to buy.</p>

        <div class="submissions-grid" id="submissions"></div>

        <div class="my-offers-section" id="my-offers-section">
            <h2>My Sent Offers</h2>
            <div id="my-offers"></div>
        </div>
    </div>

    <!-- Detail / Offer Modal -->
    <div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');
        if (!token) window.location.href = 'login.html';

        const conditionLabels = { mint: 'Mint', near_mint: 'Near Mint', lightly_played: 'Lightly Played', moderately_played: 'Mod. Played', heavily_played: 'Heavily Played', damaged: 'Damaged' };

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...options.headers }
            });
            return res.json();
        }

        async function loadSubmissions() {
            const data = await fetch('/api/buylist/marketplace').then(r => r.json());
            const grid = document.getElementById('submissions');

            if (!data.success || data.submissions.length === 0) {
                grid.innerHTML = '<div class="empty">No open submissions right now. Check back later!</div>';
                return;
            }

            grid.innerHTML = data.submissions.map(s => `
                <div class="submission-card" onclick="viewSubmission(${s.id})">
                    <div class="sub-info">
                        <h3>${esc(s.customer_name)}'s Cards</h3>
                        <div class="sub-meta">
                            <span>${s.item_count} card${s.item_count > 1 ? 's' : ''}</span>
                            <span>${new Date(s.created_at).toLocaleDateString()}</span>
                            ${s.categories ? s.categories.map(c => '<span class="badge badge-cat">' + esc(c) + '</span>').join('') : ''}
                        </div>
                    </div>
                    <div class="sub-stats">
                        <div class="sub-stat">
                            <div class="val green">$${parseFloat(s.total_asking || 0).toFixed(2)}</div>
                            <div class="lbl">Asking</div>
                        </div>
                        <div class="sub-stat">
                            <div class="val">${s.offer_count}</div>
                            <div class="lbl">Offers</div>
                        </div>
                        <button class="btn btn-primary btn-sm">View & Offer</button>
                    </div>
                </div>
            `).join('');
        }

        async function viewSubmission(id) {
            const data = await apiFetch('/api/buylist/marketplace-item?id=' + id);
            if (!data.success) return alert('Failed to load submission');

            const sub = data.submission;
            const modal = document.getElementById('modal-content');

            let html = `
                <h2>${esc(sub.customer_name)}'s Cards</h2>
                <p style="color:#888;font-size:13px;margin-bottom:16px;">
                    Submitted ${new Date(sub.created_at).toLocaleDateString()} &bull; ${data.offer_count} offer${data.offer_count !== 1 ? 's' : ''} so far
                    ${sub.notes ? '<br>Notes: ' + esc(sub.notes) : ''}
                </p>
                <table>
                    <thead><tr><th>Card</th><th>Set</th><th>Condition</th><th>Qty</th><th>Asking</th></tr></thead>
                    <tbody>
                        ${sub.items.map(i => `<tr>
                            <td><strong>${esc(i.card_name)}</strong>${i.card_number ? ' #' + esc(i.card_number) : ''}</td>
                            <td>${esc(i.set_name || '—')}</td>
                            <td>${conditionLabels[i.condition] || i.condition}</td>
                            <td>${i.quantity}</td>
                            <td>${i.asking_price ? '$' + parseFloat(i.asking_price).toFixed(2) : '—'}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            `;

            if (data.my_offer) {
                html += `
                    <div class="existing-offer">
                        <strong>Your existing offer: $${parseFloat(data.my_offer.total_offer).toFixed(2)}</strong>
                        <span style="color:#888;"> (${data.my_offer.status})</span>
                        ${data.my_offer.notes ? '<br><span style="color:#888;font-size:13px;">' + esc(data.my_offer.notes) + '</span>' : ''}
                    </div>
                `;
            }

            if (sub.status === 'pending') {
                html += `
                    <div class="offer-form">
                        <h3>${data.my_offer ? 'Update Your Offer' : 'Make an Offer'}</h3>
                        <div class="offer-row">
                            <div class="form-group">
                                <label>Your Total Offer ($)</label>
                                <input type="number" id="offer-amount" step="0.01" value="${data.my_offer ? data.my_offer.total_offer : ''}" placeholder="0.00">
                            </div>
                        </div>
                        <div class="offer-row" style="margin-top:10px;">
                            <div class="form-group">
                                <label>Note to seller (optional)</label>
                                <textarea id="offer-notes" rows="2" placeholder="e.g. I can pick up locally...">${data.my_offer ? esc(data.my_offer.notes || '') : ''}</textarea>
                            </div>
                        </div>
                        <div style="margin-top:12px;text-align:right;">
                            <button class="btn" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-green" onclick="submitOffer(${sub.id})">${data.my_offer ? 'Update Offer' : 'Submit Offer'}</button>
                        </div>
                    </div>
                `;
            }

            modal.innerHTML = html;
            document.getElementById('detail-modal').classList.add('active');
        }

        async function submitOffer(buylistId) {
            const amount = parseFloat(document.getElementById('offer-amount').value);
            if (!amount || amount <= 0) return alert('Enter a valid offer amount');

            const data = await apiFetch('/api/buylist/offers', {
                method: 'POST',
                body: JSON.stringify({
                    buylist_id: buylistId,
                    total_offer: amount,
                    notes: document.getElementById('offer-notes').value.trim() || null,
                }),
            });

            if (data.success) {
                alert(data.message);
                closeModal();
                loadSubmissions();
                loadMyOffers();
            } else {
                alert(data.error || 'Failed to submit offer');
            }
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        async function loadMyOffers() {
            const data = await apiFetch('/api/buylist/offers');
            const container = document.getElementById('my-offers');

            if (!data.success || data.offers.length === 0) {
                container.innerHTML = '<div class="empty" style="padding:1rem;">No offers sent yet.</div>';
                return;
            }

            const statusBadge = { pending: 'background:rgba(255,152,0,0.15);color:#ff9800;', accepted: 'background:rgba(76,175,80,0.15);color:#4caf50;', rejected: 'background:rgba(244,67,54,0.15);color:#f44336;' };

            container.innerHTML = data.offers.map(o => `
                <div style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <strong>${esc(o.customer_name)}'s cards</strong> (${o.item_count} cards)
                        <span class="badge" style="${statusBadge[o.status] || statusBadge.pending};margin-left:8px;">${o.status}</span>
                    </div>
                    <div style="font-weight:700;color:#4caf50;">$${parseFloat(o.total_offer).toFixed(2)}</div>
                </div>
            `).join('');
        }

        loadSubmissions();
        loadMyOffers();
    </script>
</body>
</html>
