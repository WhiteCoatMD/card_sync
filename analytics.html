<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Sync — Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
        .header { background: #1a1a2e; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a3e; }
        .header h1 { font-size: 1.5rem; }
        .nav { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: #4a90d9; border-color: #4a90d9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 2rem; }
        .stat-card { background: #1a1a2e; border-radius: 10px; padding: 20px; border: 1px solid #2a2a3e; }
        .stat-card .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-card .value { font-size: 24px; font-weight: 700; }
        .stat-card .sub { color: #666; font-size: 12px; margin-top: 2px; }
        .value-green { color: #4caf50; }
        .value-orange { color: #ff9800; }
        .value-blue { color: #4a90d9; }
        .value-purple { color: #9c27b0; }
        .section { background: #1a1a2e; border-radius: 10px; padding: 24px; margin-bottom: 16px; border: 1px solid #2a2a3e; }
        .section h2 { font-size: 1rem; margin-bottom: 16px; color: #fff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #2a2a3e; }
        th { color: #888; font-size: 11px; text-transform: uppercase; }
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .bar-row { display: flex; align-items: center; gap: 10px; }
        .bar-label { width: 100px; font-size: 12px; color: #aaa; text-align: right; flex-shrink: 0; }
        .bar-track { flex: 1; height: 24px; background: #0d0d1a; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; min-width: 40px; }
        .bar-fill.green { background: rgba(76,175,80,0.3); color: #4caf50; }
        .bar-fill.blue { background: rgba(74,144,217,0.3); color: #4a90d9; }
        .bar-fill.orange { background: rgba(255,152,0,0.3); color: #ff9800; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; }
        .toolbar select { padding: 8px 12px; border: 1px solid #333; border-radius: 6px; background: #1a1a2e; color: #fff; font-size: 13px; }
        .upgrade-msg { text-align: center; padding: 4rem 2rem; color: #888; }
        .upgrade-msg h2 { color: #fff; margin-bottom: 8px; }
        .upgrade-msg a { color: #4a90d9; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Card Sync — Analytics</h1>
        <div class="nav">
            <a href="admin.html" class="btn">Dashboard</a>
            <a href="inventory.html" class="btn">Inventory</a>
            <a href="orders.html" class="btn">Orders</a>
            <a href="marketplace.html" class="btn">Marketplace</a>
            <a href="integrations.html" class="btn">Integrations</a>
        </div>
    </div>
    <div class="container" id="main-content">
        <div class="toolbar">
            <strong style="font-size:14px;color:#aaa;">Period:</strong>
            <select id="period" onchange="loadAnalytics()">
                <option value="7">Last 7 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="90">Last 90 days</option>
                <option value="365">Last year</option>
            </select>
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="grid-2">
            <div class="section">
                <h2>Top Selling Cards</h2>
                <table id="top-sellers"><tbody><tr><td style="color:#666;">Loading...</td></tr></tbody></table>
            </div>
            <div class="section">
                <h2>Inventory Aging (Oldest Stock)</h2>
                <table id="aging"><tbody><tr><td style="color:#666;">Loading...</td></tr></tbody></table>
            </div>
        </div>

        <div class="grid-2">
            <div class="section">
                <h2>Revenue by Category</h2>
                <div class="bar-chart" id="category-chart"></div>
            </div>
            <div class="section">
                <h2>Profit Margins by Category</h2>
                <div class="bar-chart" id="margin-chart"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');
        if (!token) window.location.href = 'login.html';

        async function apiFetch(url) {
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            return res.json();
        }

        function fmt(n) { return '$' + parseFloat(n || 0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }
        function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        async function loadAnalytics() {
            const period = document.getElementById('period').value;
            const data = await apiFetch('/api/analytics?period=' + period);

            if (data.upgrade_required) {
                document.getElementById('main-content').innerHTML = '<div class="upgrade-msg"><h2>Analytics requires Pro plan or higher</h2><p><a href="pricing.html">Upgrade your plan</a> to access detailed analytics.</p></div>';
                return;
            }
            if (!data.success) return;

            const inv = data.inventory;
            const sales = data.sales;
            const profit = parseFloat(inv.potential_profit);
            const marginPct = parseFloat(inv.total_cost) > 0 ? (profit / parseFloat(inv.total_cost) * 100).toFixed(1) : '0';

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="label">Total Cards</div><div class="value value-blue">${parseInt(inv.total_cards).toLocaleString()}</div><div class="sub">${parseInt(inv.total_quantity).toLocaleString()} units in stock</div></div>
                <div class="stat-card"><div class="label">Retail Value</div><div class="value value-green">${fmt(inv.total_retail_value)}</div></div>
                <div class="stat-card"><div class="label">Inventory Cost</div><div class="value value-orange">${fmt(inv.total_cost)}</div></div>
                <div class="stat-card"><div class="label">Potential Profit</div><div class="value value-purple">${fmt(profit)}</div><div class="sub">${marginPct}% margin</div></div>
                <div class="stat-card"><div class="label">Sales (${period}d)</div><div class="value value-green">${fmt(sales.total_sales)}</div><div class="sub">${sales.sale_count} orders</div></div>
                <div class="stat-card"><div class="label">Purchases (${period}d)</div><div class="value value-orange">${fmt(sales.total_purchases)}</div><div class="sub">${sales.purchase_count} orders</div></div>
            `;

            // Top sellers
            const ts = document.getElementById('top-sellers');
            if (data.top_sellers.length === 0) {
                ts.innerHTML = '<tbody><tr><td style="color:#666;">No sales yet in this period</td></tr></tbody>';
            } else {
                ts.innerHTML = '<thead><tr><th>Card</th><th>Category</th><th>Sold</th><th>Revenue</th></tr></thead><tbody>' +
                    data.top_sellers.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.category)}</td><td>${s.total_sold}</td><td>${fmt(s.total_revenue)}</td></tr>`).join('') + '</tbody>';
            }

            // Aging
            const ag = document.getElementById('aging');
            if (data.aging.length === 0) {
                ag.innerHTML = '<tbody><tr><td style="color:#666;">No inventory</td></tr></tbody>';
            } else {
                ag.innerHTML = '<thead><tr><th>Card</th><th>Price</th><th>Qty</th><th>Days Listed</th></tr></thead><tbody>' +
                    data.aging.map(a => `<tr><td>${esc(a.name)}</td><td>${a.sell_price ? fmt(a.sell_price) : '—'}</td><td>${a.quantity}</td><td>${Math.round(a.days_listed)}d</td></tr>`).join('') + '</tbody>';
            }

            // Category chart
            const maxCatValue = Math.max(...data.categories.map(c => parseFloat(c.retail_value)), 1);
            document.getElementById('category-chart').innerHTML = data.categories.map(c => {
                const pct = (parseFloat(c.retail_value) / maxCatValue * 100).toFixed(0);
                return `<div class="bar-row"><div class="bar-label">${esc(c.category)}</div><div class="bar-track"><div class="bar-fill green" style="width:${Math.max(5,pct)}%">${fmt(c.retail_value)}</div></div></div>`;
            }).join('') || '<div style="color:#666;font-size:13px;">No data</div>';

            // Margin chart
            const maxMargin = Math.max(...data.margins.map(m => parseFloat(m.avg_margin_pct)), 1);
            document.getElementById('margin-chart').innerHTML = data.margins.map(m => {
                const pct = (parseFloat(m.avg_margin_pct) / maxMargin * 100).toFixed(0);
                const color = parseFloat(m.avg_margin_pct) > 50 ? 'green' : parseFloat(m.avg_margin_pct) > 20 ? 'blue' : 'orange';
                return `<div class="bar-row"><div class="bar-label">${esc(m.category)}</div><div class="bar-track"><div class="bar-fill ${color}" style="width:${Math.max(5,pct)}%">${parseFloat(m.avg_margin_pct).toFixed(0)}%</div></div></div>`;
            }).join('') || '<div style="color:#666;font-size:13px;">No margin data (need buy & sell prices)</div>';
        }

        loadAnalytics();
    </script>
</body>
</html>
