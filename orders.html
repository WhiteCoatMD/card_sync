<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Sync — Orders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
        .header { background: #1a1a2e; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a3e; }
        .header h1 { font-size: 1.5rem; }
        .nav { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: #4a90d9; border-color: #4a90d9; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-success { background: #4caf50; border-color: #4caf50; }
        .btn-warning { background: #ff9800; border-color: #ff9800; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .toolbar select { padding: 8px 12px; border: 1px solid #333; border-radius: 6px; background: #1a1a2e; color: #fff; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #2a2a3e; font-size: 14px; }
        th { background: #12122a; color: #aaa; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: rgba(255,255,255,0.03); }
        tr.expandable { cursor: pointer; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-buy { background: rgba(255,152,0,0.2); color: #ff9800; }
        .badge-sell { background: rgba(76,175,80,0.2); color: #4caf50; }
        .badge-pending { background: rgba(74,144,217,0.2); color: #4a90d9; }
        .badge-completed { background: rgba(76,175,80,0.2); color: #4caf50; }
        .badge-cancelled { background: rgba(158,158,158,0.2); color: #9e9e9e; }
        .order-detail { display: none; }
        .order-detail.active { display: table-row; }
        .order-detail td { background: #12122a; padding: 16px 24px; }
        .detail-table { width: 100%; margin-top: 8px; }
        .detail-table th { background: transparent; color: #666; font-size: 11px; padding: 6px 10px; }
        .detail-table td { padding: 8px 10px; font-size: 13px; border-bottom-color: #1a1a2e; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 1.5rem; }
        .empty { text-align: center; padding: 3rem; color: #666; }
        .price { font-weight: 600; }
        .price-buy { color: #ff9800; }
        .price-sell { color: #4caf50; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border-radius: 12px; padding: 30px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
        .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
        .form-group { flex: 1; }
        .form-group label { display: block; color: #aaa; font-size: 12px; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #0d0d1a; color: #fff; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .order-items-list { margin-top: 16px; }
        .order-item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; padding: 10px; background: #0d0d1a; border-radius: 6px; }
        .order-item-row input { flex: 1; padding: 8px; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #fff; font-size: 13px; }
        .order-item-row input:focus { outline: none; border-color: #4a90d9; }
        .order-total { text-align: right; font-size: 18px; font-weight: 700; margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Card Sync — Orders</h1>
        <div class="nav">
            <a href="admin.html" class="btn">Dashboard</a>
            <a href="inventory.html" class="btn">Inventory</a>
            <a href="marketplace.html" class="btn">Marketplace</a>
            <a href="integrations.html" class="btn">Integrations</a>
            <button class="btn btn-success" onclick="openOrderModal('sell')">+ New Sale</button>
            <button class="btn btn-warning" onclick="openOrderModal('buy')">+ New Buy</button>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <select id="filter-type" onchange="loadOrders()">
                <option value="">All Types</option>
                <option value="sell">Sales</option>
                <option value="buy">Purchases</option>
            </select>
            <select id="filter-status" onchange="loadOrders()">
                <option value="">All Status</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Type</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="orders-body">
            </tbody>
        </table>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- New Order Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title">New Sale</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="field-customer_name" placeholder="Walk-in customer">
                </div>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="field-notes" placeholder="Order notes..."></textarea>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
                <h3 style="font-size:14px;color:#aaa;">Items</h3>
                <button class="btn btn-sm btn-primary" onclick="addItemRow()">+ Add Item</button>
            </div>
            <div class="order-items-list" id="order-items"></div>
            <div class="order-total" id="order-total">Total: $0.00</div>

            <div class="modal-actions">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitOrder()">Create Order</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');
        if (!token) window.location.href = 'login.html';

        let currentPage = 1;
        let orderType = 'sell';
        let inventoryCache = [];

        async function apiFetch(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...options.headers }
            });
            return res.json();
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function loadOrders() {
            const params = new URLSearchParams({ page: currentPage, limit: 50 });
            const type = document.getElementById('filter-type').value;
            const status = document.getElementById('filter-status').value;
            if (type) params.set('type', type);
            if (status) params.set('status', status);

            const data = await apiFetch(`/api/orders?${params}`);
            const tbody = document.getElementById('orders-body');

            if (!data.success || data.orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">No orders found.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = data.orders.map(o => `
                <tr class="expandable" onclick="toggleDetail(${o.id}, this)">
                    <td>#${o.id}</td>
                    <td><span class="badge badge-${o.type}">${o.type === 'sell' ? 'Sale' : 'Purchase'}</span></td>
                    <td>${esc(o.customer_name || o.user_display_name || o.user_email || '—')}</td>
                    <td>${o.item_count} item${o.item_count != 1 ? 's' : ''}</td>
                    <td class="price ${o.type === 'sell' ? 'price-sell' : 'price-buy'}">$${parseFloat(o.total_amount).toFixed(2)}</td>
                    <td><span class="badge badge-${o.status}">${o.status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
                <tr class="order-detail" id="detail-${o.id}">
                    <td colspan="7">
                        ${o.notes ? `<p style="color:#888;margin-bottom:8px;">Notes: ${esc(o.notes)}</p>` : ''}
                        <div id="detail-items-${o.id}"><em style="color:#666">Click to load details...</em></div>
                    </td>
                </tr>
            `).join('');

            const pages = Math.ceil(data.total / data.limit);
            if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button class="btn btn-sm${i === data.page ? ' btn-primary' : ''}" onclick="currentPage=${i};loadOrders()">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        async function toggleDetail(orderId, row) {
            const detail = document.getElementById(`detail-${orderId}`);
            const isActive = detail.classList.contains('active');
            document.querySelectorAll('.order-detail').forEach(d => d.classList.remove('active'));

            if (isActive) return;
            detail.classList.add('active');

            const container = document.getElementById(`detail-items-${orderId}`);
            const data = await apiFetch(`/api/orders/${orderId}`);
            if (!data.success) { container.innerHTML = '<em style="color:#f44">Failed to load</em>'; return; }

            if (data.order.items.length === 0) {
                container.innerHTML = '<em style="color:#666">No items</em>';
                return;
            }

            container.innerHTML = `<table class="detail-table">
                <thead><tr><th>Card</th><th>Category</th><th>Set</th><th>Condition</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr></thead>
                <tbody>${data.order.items.map(i => `
                    <tr>
                        <td>${esc(i.card_name || 'Unknown')}</td>
                        <td>${esc(i.category || '—')}</td>
                        <td>${esc(i.set_name || '—')}</td>
                        <td>${esc(i.condition || '—')}</td>
                        <td>${i.quantity}</td>
                        <td>$${parseFloat(i.unit_price).toFixed(2)}</td>
                        <td>$${(i.quantity * parseFloat(i.unit_price)).toFixed(2)}</td>
                    </tr>
                `).join('')}</tbody>
            </table>`;
        }

        // --- New Order Modal ---
        async function openOrderModal(type) {
            orderType = type;
            document.getElementById('modal-title').textContent = type === 'sell' ? 'New Sale' : 'New Purchase';
            document.getElementById('field-customer_name').value = '';
            document.getElementById('field-notes').value = '';
            document.getElementById('order-items').innerHTML = '';
            updateOrderTotal();

            // Load inventory for item selection
            if (inventoryCache.length === 0) {
                const data = await apiFetch('/api/inventory?limit=100&status=available');
                if (data.success) inventoryCache = data.inventory;
            }

            addItemRow();
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        let itemRowId = 0;
        function addItemRow() {
            itemRowId++;
            const container = document.getElementById('order-items');
            const row = document.createElement('div');
            row.className = 'order-item-row';
            row.id = `item-row-${itemRowId}`;

            const options = inventoryCache.map(i =>
                `<option value="${i.id}" data-price="${orderType === 'sell' ? (i.sell_price || 0) : (i.buy_price || 0)}">${esc(i.name)} — ${esc(i.category)}${i.set_name ? ' / ' + esc(i.set_name) : ''} (${i.quantity} in stock)</option>`
            ).join('');

            row.innerHTML = `
                <select onchange="onItemSelect(this, ${itemRowId})" style="flex:2;padding:8px;border:1px solid #333;border-radius:4px;background:#1a1a2e;color:#fff;font-size:13px;">
                    <option value="">Select card...</option>
                    ${options}
                </select>
                <input type="number" id="qty-${itemRowId}" value="1" min="1" style="flex:0 0 60px;" placeholder="Qty" oninput="updateOrderTotal()">
                <input type="number" id="price-${itemRowId}" step="0.01" min="0" style="flex:0 0 100px;" placeholder="Price" oninput="updateOrderTotal()">
                <button class="btn btn-sm" onclick="document.getElementById('item-row-${itemRowId}').remove();updateOrderTotal()" style="flex:0 0 auto;color:#f44;">✕</button>
            `;
            container.appendChild(row);
        }

        function onItemSelect(sel, rowId) {
            const opt = sel.selectedOptions[0];
            if (opt && opt.dataset.price) {
                document.getElementById(`price-${rowId}`).value = parseFloat(opt.dataset.price).toFixed(2);
                updateOrderTotal();
            }
        }

        function updateOrderTotal() {
            let total = 0;
            document.querySelectorAll('.order-item-row').forEach(row => {
                const qty = parseFloat(row.querySelector('input[type="number"]').value) || 0;
                const price = parseFloat(row.querySelectorAll('input[type="number"]')[1].value) || 0;
                total += qty * price;
            });
            document.getElementById('order-total').textContent = `Total: $${total.toFixed(2)}`;
        }

        async function submitOrder() {
            const items = [];
            document.querySelectorAll('.order-item-row').forEach(row => {
                const sel = row.querySelector('select');
                const inputs = row.querySelectorAll('input[type="number"]');
                if (sel.value) {
                    items.push({
                        inventory_id: parseInt(sel.value),
                        quantity: parseInt(inputs[0].value) || 1,
                        unit_price: parseFloat(inputs[1].value) || 0
                    });
                }
            });

            if (items.length === 0) return alert('Add at least one item');

            const body = {
                type: orderType,
                customer_name: document.getElementById('field-customer_name').value || null,
                notes: document.getElementById('field-notes').value || null,
                items
            };

            const data = await apiFetch('/api/orders', { method: 'POST', body: JSON.stringify(body) });
            if (data.success) {
                closeModal();
                inventoryCache = []; // refresh cache
                loadOrders();
            } else {
                alert(data.error || 'Failed to create order');
            }
        }

        loadOrders();
    </script>
</body>
</html>
