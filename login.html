<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Sync — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1a1a2e; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #fff; text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; font-size: 14px; }
        label { color: #aaa; font-size: 13px; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0d0d1a; color: #fff; font-size: 15px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4a90d9; }
        button { width: 100%; padding: 14px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #3a7bc8; }
        .error { color: #f44336; text-align: center; margin-bottom: 16px; font-size: 14px; display: none; }
        .signup-link { text-align: center; margin-top: 20px; color: #888; font-size: 13px; }
        .signup-link a { color: #4a90d9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Card Sync</h1>
        <p class="subtitle">Playing Card Trading Platform</p>
        <div class="error" id="error"></div>
        <form onsubmit="login(event)">
            <label>Email</label>
            <input type="email" id="email" required>
            <label>Password</label>
            <input type="password" id="password" required>
            <button type="submit">Log In</button>
        </form>
        <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script>
        if (localStorage.getItem('auth_token')) window.location.href = 'admin.html';

        async function login(e) {
            e.preventDefault();
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'admin.html';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error';
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
